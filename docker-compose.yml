version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gramin_udyog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gramin_udyog
      JWT_SECRET: change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
