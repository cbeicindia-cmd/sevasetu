name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: |
          cd backend
          npm install
          npm run check

      - name: Install frontend deps
        run: |
          cd frontend
          npm install
          npm run check

      - name: Install mobile deps
        run: |
          cd mobile
          npm install
          npm run check

      - name: Build backend and frontend
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -t gramin-udyog-backend ./backend
          docker build -t gramin-udyog-frontend ./frontend
